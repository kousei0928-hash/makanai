<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ログイン / 新規登録</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div class="brand">まかない弁当</div>
        <nav class="nav">
          <a href="/index.html">ホーム</a>
        </nav>
      </header>

      <div class="panel" style="max-width: 400px; margin: 0 auto;">
        <h2 id="formTitle">ログイン</h2>

        <div id="nameField" class="field" style="margin-bottom: 12px; display: none;">
          <span>名前</span>
          <input id="name" type="text" placeholder="例: 山田 太郎" />
        </div>

        <div class="field" style="margin-bottom: 12px;">
          <span>メールアドレス</span>
          <input id="email" type="email" placeholder="example@mail.com" />
        </div>

        <div class="field" style="margin-bottom: 16px;">
          <span>パスワード</span>
          <input id="password" type="password" placeholder="6文字以上" />
        </div>

        <button id="submitBtn" style="width: 100%;">ログイン</button>

        <div style="margin-top: 16px; text-align: center;">
          <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px;">
            <hr style="flex:1; border: none; border-top: 1px solid #ddd;" />
            <span style="color: #999; font-size: 13px;">または</span>
            <hr style="flex:1; border: none; border-top: 1px solid #ddd;" />
          </div>
          <a href="/api/auth/line" id="lineLoginBtn"
             style="display: inline-flex; align-items: center; justify-content: center; gap: 8px;
                    width: 100%; padding: 10px; background: #06C755; color: #fff; border-radius: 6px;
                    font-weight: bold; text-decoration: none; font-size: 15px;">
            LINEでログイン
          </a>
        </div>

        <p style="margin-top: 12px; text-align: center;">
          <a href="#" id="toggleMode" style="color: var(--accent);">アカウントをお持ちでない方はこちら</a>
        </p>

        <p id="message" style="margin-top: 12px;"></p>
      </div>
    </div>

    <footer class="bottom-menu">
      <a href="/index.html">ホーム</a>
      <a href="/cart.html" class="cart-link">カート<span class="cart-badge" id="cartBadge"></span></a>
      <a href="/history.html">購入履歴</a>
      <a href="/mypage.html">マイページ</a>
    </footer>

    <script src="/js/common.js" defer></script>
    <script src="/js/login.js" defer></script>
  </body>
</html>
