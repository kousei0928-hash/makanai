<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>まかない弁当</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="container" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;text-align:center;">
      <h1 style="font-size:32px;margin-bottom:8px;">まかない弁当</h1>
      <p class="muted" style="margin-bottom:40px;">フードロス削減のための注文アプリ</p>

      <div style="display:flex;flex-direction:column;gap:16px;width:min(320px,90%);">
        <a href="/index.html" class="portal-btn buyer">
          <span class="portal-icon">🍱</span>
          <span class="portal-label">購入者画面</span>
          <span class="portal-desc">商品の閲覧・購入</span>
        </a>
        <a href="/admin" class="portal-btn admin" id="adminBtn" style="display:none;">
          <span class="portal-icon">⚙️</span>
          <span class="portal-label">管理者画面</span>
          <span class="portal-desc">商品の登録・在庫管理</span>
        </a>
      </div>

      <p id="loginHint" class="muted" style="margin-top:24px;font-size:13px;"></p>
    </div>

    <script>
      (async () => {
        try {
          const res = await fetch('/api/auth/me');
          const data = await res.json();
          const hint = document.getElementById('loginHint');
          const adminBtn = document.getElementById('adminBtn');

          if (data.user) {
            hint.textContent = `${data.user.name} さんでログイン中`;
            // 管理者メールアドレスの場合のみ管理者ボタンを表示
            const adminEmails = ['admin@example.com', 'tyerukun0928@gmail.com'];
            if (adminEmails.includes(data.user.email)) {
              adminBtn.style.display = '';
            }
          } else {
            hint.innerHTML = '<a href="/login.html">ログイン</a>すると管理者機能が使えます';
          }
        } catch {}
      })();
    </script>
  </body>
</html>
