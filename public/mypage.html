<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>マイページ</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div class="brand">マイページ</div>
        <nav class="nav">
          <a href="/index.html">ホーム</a>
        </nav>
      </header>

      <div class="panel" id="mypageContent" style="max-width: 480px; margin: 0 auto;">
        <p>読み込み中...</p>
      </div>

      <!-- LINE通知設定 -->
      <div class="panel" id="lineNotifyPanel" style="max-width: 480px; margin: 20px auto; display: none;">
        <h3 style="margin: 0 0 12px">LINE通知設定</h3>
        <div id="lineNotifyStatus" style="margin-bottom: 12px;"></div>
        <div id="lineNotifyForm">
          <label style="display:flex; align-items:center; gap:8px; margin-bottom:12px; cursor:pointer;">
            <input type="checkbox" id="lineNotifyToggle" />
            <span>LINE通知を受け取る</span>
          </label>
          <p style="font-size:13px; color:var(--muted); margin:0 0 10px">通知を受け取る食堂を選択：</p>
          <div id="storeCheckboxes"></div>
          <button id="saveLineNotify" style="margin-top: 12px;">保存</button>
          <p id="lineNotifyMsg" style="margin: 8px 0 0; font-size: 13px;"></p>
        </div>
      </div>
    </div>

    <footer class="bottom-menu">
      <a href="/index.html">ホーム</a>
      <a href="/cart.html" class="cart-link">カート<span class="cart-badge" id="cartBadge"></span></a>
      <a href="/history.html">購入履歴</a>
      <a href="/mypage.html">マイページ</a>
    </footer>

    <script src="/js/common.js" defer></script>
    <script src="/js/mypage.js" defer></script>
  </body>
</html>
