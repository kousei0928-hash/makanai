<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>まかない弁当</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="container">
      <header class="hero-header">
        <!-- 1段目: ロゴ + ブランド + ユーザー情報 -->
        <div class="hero-top">
          <div class="hero-brand">
            <span class="hero-brand-text">まかない</span>
          </div>
          <nav class="nav">
            <!-- auth-link は common.js で追加 -->
          </nav>
        </div>

        <!-- 2段目: 食堂選択 + 受け取り時間 -->
        <div class="hero-mid">
          <select id="storeSelect" class="hero-select">
            <option value="">食堂を選ぶ</option>
            <option value="1">北一食堂</option>
            <option value="2">大学食堂</option>
            <option value="3">南食堂</option>
          </select>
          <div class="hero-pickup">
            <span class="hero-pickup-label">受け取り可能時間</span>
            <span class="hero-pickup-time">19:45〜20:30</span>
          </div>
        </div>
      </header>

      <div id="storeStock" class="store-stock-bar"></div>

      <section>
        <p id="storeFilterInfo" class="muted"></p>
        <div id="productGrid" class="grid"></div>
      </section>
    </div>

    <footer class="bottom-menu">
      <a href="/index.html">ホーム</a>
      <a href="/cart.html" class="cart-link">カート<span class="cart-badge" id="cartBadge"></span></a>
      <a href="/history.html">購入履歴</a>
      <a href="/mypage.html">マイページ</a>
    </footer>

    <script src="/js/common.js" defer></script>
    <script src="/js/index.js" defer></script>
  </body>
</html>
