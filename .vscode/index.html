<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>表の作成例</title>
<style>
  table {
    border-collapse: collapse;
    width: 100%;
    max-width: 600px;
  }
  th, td {
    border: 1px solid #000;
    padding: 8px;
    text-align: center;
    vertical-align: middle;
  }
  th {
    background-color: #f0f0f0;
  }
  /* AチームとBチームのヘッダー */
  .team-header {
    font-weight: bold;
    font-size: 1.2em;
  }
  /* 備考列の幅を狭く */
  .remarks {
    width: 80px;
  }
  /* 人数列の幅を狭く */
  .count {
    width: 60px;
  }
</style>
</head>
<body>

<table>
  <thead>
    <tr>
        <th colspan="9" class="main-title">オカヤ一次</th>
      </tr>
    <tr>
        <th colspan="3" class="team-header">試合時間</th>
      <th colspan="3" class="team-header">Aチーム</th>
      <th colspan="3" class="team-header">Bチーム</th>
    </tr>
    <tr>

  </thead>
  <tbody>
    <tr>
        <td>10:00</td>

    <tr>
      <td></td><td></td><td></td>
      <td></td><td></td><td></td>
      <td></td><td></td><td></td>
    </tr>
    <tr>
        <td></td><td></td><td></td>
        <td></td><td></td><td></td>
        <td></td><td></td><td></td>
      </tr>
      <tr>
        <td></td><td></td><td></td>
        <td></td><td></td><td></td>
        <td></td><td></td><td></td>
      </tr>
  </tbody>
</table>

</body>
</html>
